name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# We provision Chrome explicitly (setup-chrome) for the audit jobs, so skip
# Puppeteer's own ~150MB browser download during npm ci everywhere.
env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  accessibility:
    name: WCAG 2.1 AA (axe-core)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run axe-core WCAG 2.1 AA scan
        run: npm run a11y
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}

  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Run Lighthouse CI
        run: npm run test:lighthouse
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
